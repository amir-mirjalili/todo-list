name: Test

on:
  pull_request:
  workflow_call:

env:
  DB : mongodb://localhost:27017/todo-list

jobs:
  test:
    name: Test

    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read

    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pnpm i

      - name: Test the project
        run: npm run test
